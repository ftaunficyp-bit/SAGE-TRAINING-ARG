<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITE AWARE - Training Platform</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* ESTILOS GENERALES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background-color: #1e293b; width: 100%; max-width: 1100px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); padding: 40px; }
        .wide-container { max-width: 1300px; }
        .map-container { max-width: 100% !important; width: 100vw !important; height: 95vh !important; padding: 10px; }
        
        /* HOME */
        .home-title { border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 30px; color: #009EDB; }
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .home-section { background: #0f172a; padding: 25px; border-radius: 8px; border-top: 4px solid #009EDB; }
        .home-section h3 { margin-bottom: 20px; font-size: 18px; color: #fff; }
        
        /* SAGE HUB */
        .sage-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }

        /* FORMULARIO */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #cbd5e1; }
        label.required::after { content: " *"; color: #ef4444; }
        input, select, textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: #009EDB; outline: none; }
        .sub-group { margin-top: 10px; padding-left: 15px; border-left: 2px solid #009EDB; display: none; }

        /* BASE DE DATOS */
        .db-table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background-color: #334155; color: #fff; padding: 12px 15px; font-weight: 600; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #334155; vertical-align: top; line-height: 1.5; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-open { background-color: #b45309; color: #fef3c7; }
        .badge-close { background-color: #15803d; color: #dcfce7; }

        /* CONTENEDOR MAPA */
        .map-iframe-wrapper { width: 100%; height: 650px; border: 2px solid #334155; border-radius: 8px; margin-top: 10px; background: #0f172a; }

        /* BOTONES */
        .btn { background: #009EDB; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%; margin-top: 10px; text-transform: uppercase; text-align: center; }
        .btn:hover { background: #007cc0; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }
        .btn-back { width: auto; background: transparent; color: #94a3b8; border: 1px solid #475569; margin-bottom: 20px; padding: 6px 12px; }

        /* ALERTA */
        .alert { display: none; margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="mainContainer" class="container">

        <div id="screenHome">
            <h2 class="home-title">Módulo Principal (HOME)</h2>
            <div class="home-grid">
                <div class="home-section">
                    <h3>1. INPUT INFORMATION</h3>
                    <button type="button" class="btn btn-secondary" onclick="alert('Módulo Patrol Plans en mantenimiento.')">Patrol Plans</button>
                    <button type="button" class="btn" onclick="navegarA('screenSageHub')">Sage</button>
                </div>
                <div class="home-section">
                    <h3>2. VISUALIZE AND ANALYSE INFO</h3>
                    <button type="button" class="btn btn-secondary" onclick="irAMapa('screenHome')">Maps</button>
                    <button type="button" class="btn btn-secondary" onclick="irABaseDatos('screenHome')">Sage Search</button>
                </div>
            </div>
        </div>

        <div id="screenSageHub" style="display: none;">
            <button type="button" class="btn btn-back" onclick="navegarA('screenHome')">← Volver al Home</button>
            <h2 class="home-title">Módulo SAGE</h2>
            <div class="sage-menu">
                <button type="button" class="btn btn-secondary" onclick="irABaseDatos('screenSageHub')">Search Events</button>
                <button type="button" class="btn btn-secondary" onclick="irAMapa('screenSageHub')">Map View</button>
                <button type="button" class="btn" onclick="navegarA('screenSubmitEvent')">Submit Event</button>
            </div>
        </div>

        <div id="screenSubmitEvent" style="display: none;">
            <button type="button" class="btn btn-back" onclick="navegarA('screenSageHub')">← Volver a Sage</button>
            <h2 class="home-title" style="margin-bottom: 20px;">Submit Event Form</h2>
            
            <form id="sageForm" onsubmit="validarYGuardarFormulario(event)">
                <div class="form-grid">
                    
                    <div class="form-group full-width">
                        <label class="required">1. FORM</label>
                        <select id="inputForm" required onchange="actualizarTitulo()">
                            <option value="">Seleccione tipo...</option>
                            <option value="Incident: civilian incidents">Incident: civilian incidents</option>
                            <option value="Incident: criminal incidents">Incident: criminal incidents</option>
                            <option value="Incident: military violations">Incident: military violations</option>
                            <option value="Activity: military tasks">Activity: military tasks</option>
                            <option value="Activity: civil affairs tasks">Activity: civil affairs tasks</option>
                            <option value="Activity: Military information">Activity: Military information</option>
                            <option value="Activity: police tasks">Activity: police tasks</option>
                            <option value="Activity: trust buildings/intercomunal/outreach events">Activity: trust buildings/intercomunal/outreach events</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label class="required">2. TITLE (Autogenerado)</label>
                        <input type="text" id="inputTitle" readonly required placeholder="Se completará automáticamente...">
                    </div>

                    <div class="form-group">
                        <label>3. SEVERITY LEVEL</label>
                        <select id="inputSeverity">
                            <option value="N/A">N/A</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>4. CREDIBILITY LEVEL</label>
                        <select id="inputCredibility">
                            <option value="N/A">N/A</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="required">5. EVENT DATE</label>
                        <input type="date" required id="evDate">
                    </div>
                    <div class="form-group">
                        <label class="required">6. TIME OF EVENT (24hs)</label>
                        <input type="time" required id="evTime">
                    </div>

                    <div class="form-group">
                        <label class="required">7. REPORT DATE</label>
                        <input type="date" required id="repDate">
                    </div>
                    <div class="form-group">
                        <label class="required">8. TIME OF REPORT (24hs)</label>
                        <input type="time" required id="repTime">
                    </div>

                    <div class="form-group full-width">
                        <label class="required">9. WHAT</label>
                        <select id="selectWhat" required onchange="controlarSubCategorias('What')">
                            <option value="">Seleccione grupo...</option>
                            <option value="CIVILIAN INCIDENTS">CIVILIAN INCIDENTS</option>
                            <option value="DEMONSTRATION">DEMONSTRATION</option>
                            <option value="FIRE">FIRE</option>
                            <option value="INCURSION">INCURSION</option>
                        </select>
                        <div id="subWhatCivilian" class="sub-group">
                            <label class="required">Subcategoría Civilian Incidents</label>
                            <select id="subWhatCivilianSelect">
                                <option value="CONSTRUCTION">CONSTRUCTION</option>
                                <option value="CROSSING THE MSL BY CIVILIANS">CROSSING THE MSL BY CIVILIANS</option>
                                <option value="CROSSING POINT OF INCIDENT">CROSSING POINT OF INCIDENT</option>
                            </select>
                        </div>
                        <div id="subWhatIncursion" class="sub-group">
                            <label class="required">Subcategoría Incursion</label>
                            <select id="subWhatIncursionSelect">
                                <option value="DOG TRAINING">DOG TRAINING</option>
                                <option value="FARMING/GRAZING">FARMING/GRAZING</option>
                                <option value="FORAGING">FORAGING</option>
                                <option value="LAW ENFORCEMENT OFFICIAL IN UNIFORM">LAW ENFORCEMENT OFFICIAL IN UNIFORM</option>
                                <option value="LAW ENFORCEMENT OFFICIAL IN CIVILIAN CLOTHING">LAW ENFORCEMENT OFFICIAL IN CIVILIAN CLOTHING</option>
                                <option value="MIGRANTS/ASYLUM SEEKERS/REFUGEES">MIGRANTS/ASYLUM SEEKERS/REFUGEES</option>
                                <option value="PHOTOGRAPHY">PHOTOGRAPHY</option>
                                <option value="WATER DRILLING">WATER DRILLING</option>
                                <option value="OTHER">OTHER</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="required">10. WHO</label>
                        <select id="selectWho" required onchange="controlarSubCategorias('Who')">
                            <option value="">Seleccione rol...</option>
                            <option value="PERPETRATORS/ACTORS/OFFENDERS">PERPETRATORS/ACTORS/OFFENDERS</option>
                            <option value="PARTICIPANTS">PARTICIPANTS</option>
                            <option value="ORGANIZERS">ORGANIZERS</option>
                        </select>
                        <div id="subWhoPerp" class="sub-group">
                            <label class="required">Subcategoría Perpetrators</label>
                            <select id="subWhoPerpSelect">
                                <option value="CIVILIAN GREEK CYPRIOT">CIVILIAN GREEK CYPRIOT</option>
                                <option value="CIVILIAN TURKISH CYPRIOT">CIVILIAN TURKISH CYPRIOT</option>
                                <option value="CIVILIAN 3RD COUNTRY NATIONAL">CIVILIAN 3RD COUNTRY NATIONAL</option>
                                <option value="CRIMINAL GANG">CRIMINAL GANG</option>
                                <option value="GREEK CYPRIOTS NATIONALISTS GROUPS">GREEK CYPRIOTS NATIONALISTS GROUPS</option>
                                <option value="HELLENIC FORCES IN CYPRUS">HELLENIC FORCES IN CYPRUS</option>
                                <option value="REPUBLIC OF CYPRUS NATIONAL GUARD">REPUBLIC OF CYPRUS NATIONAL GUARD</option>
                                <option value="REPUBLIC OF CYPRUS POLICE">REPUBLIC OF CYPRUS POLICE</option>
                                <option value="TURKISH NATIONALISTS GROUPS">TURKISH NATIONALISTS GROUPS</option>
                                <option value="TURKISH CYPRIOT POLICE">TURKISH CYPRIOT POLICE</option>
                                <option value="TURKISH CYPRIOT SECURITY FORCES">TURKISH CYPRIOT SECURITY FORCES</option>
                                <option value="TURKISH MAINLAND ARMY">TURKISH MAINLAND ARMY</option>
                                <option value="OTHER STATE ACTOR">OTHER STATE ACTOR</option>
                                <option value="UNKNOWN">UNKNOWN</option>
                            </select>
                        </div>
                        <div id="subWhoPart" class="sub-group">
                            <label class="required">Subcategoría Participants</label>
                            <select id="subWhoPartSelect">
                                <option value="ARMENIANS">ARMENIANS</option>
                                <option value="GREEK CYPRIOTS">GREEK CYPRIOTS</option>
                                <option value="LATINS">LATINS</option>
                                <option value="MARONITES">MARONITES</option>
                                <option value="NGO/CIVIL SOCIETY ORGANIZATIONS">NGO/CIVIL SOCIETY ORGANIZATIONS</option>
                                <option value="POLITICAL PARTIES">POLITICAL PARTIES</option>
                                <option value="REPUBLIC OF CYPRUS GOVERNMENT">REPUBLIC OF CYPRUS GOVERNMENT</option>
                                <option value="3RD COUNTRY NATIONALS">3RD COUNTRY NATIONALS</option>
                                <option value="TURKISH CYPRIOTS">TURKISH CYPRIOTS</option>
                                <option value="TURKISH CYPRIOT AUTHORITIES">TURKISH CYPRIOT AUTHORITIES</option>
                                <option value="TURKISH NATIONALS">TURKISH NATIONALS</option>
                                <option value="UN AGENCIES">UN AGENCIES</option>
                                <option value="UNKNOWN">UNKNOWN</option>
                            </select>
                        </div>
                        <div id="subWhoOrg" class="sub-group">
                            <label class="required">Subcategoría Organizers</label>
                            <select id="selectOrg" onchange="controlarSubCategorias('Unficyp')">
                                <option value="GREEK CYPRIOT COMMUNITY">GREEK CYPRIOT COMMUNITY</option>
                                <option value="INTERCOMUNAL">INTERCOMUNAL</option>
                                <option value="TURKISH CYPRIOT COMMUNITY">TURKISH CYPRIOT COMMUNITY</option>
                                <option value="UNFICYP">UNFICYP</option>
                            </select>
                            <div id="subWhoUnficyp" class="sub-group" style="margin-top:10px;">
                                <label class="required">Rama UNFICYP</label>
                                <select id="subWhoUnficypSelect">
                                    <option value="CIVIL AFFAIRS">CIVIL AFFAIRS</option>
                                    <option value="GENDER AFFAIRS OFFICE">GENDER AFFAIRS OFFICE</option>
                                    <option value="MILITARY">MILITARY</option>
                                    <option value="OSRSG">OSRSG</option>
                                    <option value="PIO">PIO</option>
                                    <option value="UNMAS">UNMAS</option>
                                    <option value="UNPOL">UNPOL</option>
                                    <option value="SECURITY SECTION/UNDSS">SECURITY SECTION/UNDSS</option>
                                    <option value="OTHER">OTHER</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="required">11. WHERE (Sectors)</label>
                        <select id="selectSector" required onchange="controlarSubCategorias('Sector')">
                            <option value="">Seleccione Sector...</option>
                            <option value="UNPA">UNPA</option>
                            <option value="SECTOR 2">SECTOR 2</option>
                            <option value="SECTOR 4">SECTOR 4</option>
                            <option value="SECTOR 1">SECTOR 1</option>
                        </select>
                        <div id="subSector1" class="sub-group">
                            <label class="required">Establecimiento Sector 1</label>
                            <select id="subSector1Select">
                                <option value="CAMP ROCA">CAMP ROCA</option>
                                <option value="CAMP SAN MARTIN">CAMP SAN MARTIN</option>
                                <option value="DHENIA">DHENIA</option>
                                <option value="KATO PYRGOS">KATO PYRGOS</option>
                                <option value="LINOU">LINOU</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>12. ATMOSPHERE</label>
                        <select id="inputAtmosphere">
                            <option value="N/A">N/A</option>
                            <option value="TENSE">TENSE</option>
                            <option value="PEACEFUL">PEACEFUL</option>
                            <option value="VIOLENT">VIOLENT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>13. TENSIONS</label>
                        <select id="inputTensions">
                            <option value="N/A">N/A</option>
                            <option value="CIVILIAN VAV OPFOR">CIVILIAN VAV OPFOR</option>
                            <option value="CIVILIAN VAV CIVILIAN">CIVILIAN VAV CIVILIAN</option>
                            <option value="CIVILIAN VAV UNFICYP">CIVILIAN VAV UNFICYP</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>14. FOCUS</label>
                        <select id="inputFocus">
                            <option value="PROSOLUTION">PROSOLUTION</option>
                            <option value="ANTI-SOLUTION">ANTI-SOLUTION</option>
                            <option value="VAROSHA">VAROSHA</option>
                            <option value="ANTI TRNC">ANTI TRNC</option>
                            <option value="OTHER">OTHER</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>15. PERPETRATOR NAME</label>
                        <input type="text" id="inputPerpName" placeholder="Nombre (si aplica)">
                    </div>
                    <div class="form-group">
                        <label class="required">16. REPORTING OFFICER NAME AND RANK</label>
                        <input type="text" id="inputOfficer" required placeholder="Ej: Teniente Primero Perez">
                    </div>

                    <div class="form-group">
                        <label class="required">17. STATUS OF EVENT</label>
                        <select id="inputStatus" required>
                            <option value="OPEN">OPEN</option>
                            <option value="CLOSE">CLOSE</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="required">18. COORDINATES (Lat, Lon)</label>
                        <input type="text" id="mgrsInput" required placeholder="Ej: -36.6725, -64.3795">
                    </div>

                    <div class="form-group full-width">
                        <label class="required">19. LOCATION NAME</label>
                        <input type="text" id="inputLocName" required placeholder="Nombre geográfico de la localización">
                    </div>

                    <div class="form-group full-width">
                        <label class="required">20. UPLOAD PHOTO/PDF (Máx. 5MB)</label>
                        <input type="file" id="fileInput" accept="image/*">
                    </div>

                    <div class="form-group full-width">
                        <label class="required">INCIDENT DESCRIPTION</label>
                        <textarea id="incidentDesc" required rows="3" placeholder="Escriba brevemente los hechos..." oninput="actualizarTitulo()"></textarea>
                    </div>

                </div>

                <button type="submit" class="btn" style="background-color: #16a34a; margin-top: 30px;">Enviar Reporte de Entrenamiento</button>
            </form>

            <div id="feedbackAlert" class="alert"></div>
        </div>

        <div id="screenDatabase" style="display: none;">
            <button type="button" id="btnBackFromDB" class="btn btn-back">← Volver</button>
            <h2 class="home-title">SAGE Search - Base de Datos de Reportes</h2>
            
            <div class="db-table-wrapper">
                <table id="reportsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Event Date</th>
                            <th>Report Extracted Data</th>
                            <th>Author</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="dbTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="screenMap" style="display: none;">
            <button type="button" id="btnBackFromMap" class="btn btn-back">← Volver</button>
            <h2 class="home-title">Live Tactical Map</h2>
            <div id="map" class="map-iframe-wrapper"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // PEGA TU ENLACE LARGO DE GOOGLE ACÁ ADENTRO:
        const urlGoogleSheets = "https://script.google.com/macros/s/AKfycbwYD9dYDrpW9aLO4z7FsmJtqGZ2FsZICkZIJJR1ycCxuWuCSr_OI-RPxvprIt_LOX4R/exec";

        let baseDeDatosReportes = [];
        let secuencialID = 1;
        let pantallaOrigenDB = 'screenHome';
        let pantallaOrigenMapa = 'screenHome';
        let mapaTacto = null;
        let grupoMarcadores = null;

        function navegarA(idPantalla) {
            const container = document.getElementById('mainContainer');
            
            if (idPantalla === 'screenDatabase') {
                container.className = "container wide-container";
            } else if (idPantalla === 'screenMap') {
                container.className = "map-container";
            } else {
                container.className = "container";
            }

            document.getElementById('screenHome').style.display = 'none';
            document.getElementById('screenSageHub').style.display = 'none';
            document.getElementById('screenSubmitEvent').style.display = 'none';
            document.getElementById('screenDatabase').style.display = 'none';
            document.getElementById('screenMap').style.display = 'none';

            document.getElementById(idPantalla).style.display = 'block';
            window.scrollTo(0, 0);
        }

        function irABaseDatos(origen) {
            pantallaOrigenDB = origen;
            document.getElementById('btnBackFromDB').onclick = function() { navegarA(pantallaOrigenDB); };
            renderizarTabla();
            navegarA('screenDatabase');
        }

        function irAMapa(origen) {
            pantallaOrigenMapa = origen;
            document.getElementById('btnBackFromMap').onclick = function() { navegarA(pantallaOrigenMapa); };
            navegarA('screenMap');
            inicializarMapaNativo();
        }

        function inicializarMapaNativo() {
            if (mapaTacto === null) {
                mapaTacto = L.map('map').setView([-36.6735, -64.3795], 13);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 19, attribution: 'Tiles © Esri'
                }).addTo(mapaTacto);
                grupoMarcadores = L.layerGroup().addTo(mapaTacto);
            }

            grupoMarcadores.clearLayers();

            function dibujarPin(rep) {
                if (!rep || !rep.latLon) return;
                let coordsStr = String(rep.latLon).trim();
                if (!coordsStr.includes(',')) return;
                
                const coords = coordsStr.split(',').map(num => parseFloat(num.trim()));
                if (coords.length === 2 && !isNaN(coords[0]) && !isNaN(coords[1])) {
                    const contenidoPopup = `
                        <div style="color: #0f172a; font-family: sans-serif; font-size:13px; min-width: 200px;">
                            <strong style="color:#009EDB;">${rep.id || '#'} - ${rep.title || 'Reporte'}</strong><br><br>
                            <b>What:</b> ${rep.what || 'N/A'}<br>
                            <b>Who:</b> ${rep.who || 'N/A'}<br>
                            <b>Location:</b> ${rep.where || 'N/A'}<br>
                            <b>Officer:</b> ${rep.author || 'N/A'}<br>
                            <b>Status:</b> <span style="color:${rep.status === 'OPEN' ? '#b45309':'#15803d'}; font-weight:bold;">${rep.status || 'OPEN'}</span>
                        </div>
                    `;
                    L.marker([coords[0], coords[1]]).addTo(grupoMarcadores).bindPopup(contenidoPopup);
                }
            }

            if (Array.isArray(baseDeDatosReportes)) {
                baseDeDatosReportes.forEach(rep => { dibujarPin(rep); });
            }

            if (typeof urlGoogleSheets !== 'undefined' && urlGoogleSheets.trim() !== "" && !urlGoogleSheets.includes("REPLACE_THIS")) {
                fetch(urlGoogleSheets)
                .then(response => response.json())
                .then(pinesDelSheet => {
                    if (Array.isArray(pinesDelSheet)) {
                        pinesDelSheet.forEach(repSheet => {
                            const existe = baseDeDatosReportes.some(r => String(r.id) === String(repSheet.id));
                            if (!existe) {
                                baseDeDatosReportes.push(repSheet);
                                dibujarPin(repSheet);
                            }
                        });
                    }
                })
                .catch(error => { console.warn("Modo local activo:", error); });
            }

            setTimeout(() => { mapaTacto.invalidateSize(); }, 250);
        }

        function controlarSubCategorias(tipo) {
            if(tipo === 'What') {
                const val = document.getElementById('selectWhat').value;
                document.getElementById('subWhatCivilian').style.display = (val === 'CIVILIAN INCIDENTS') ? 'block' : 'none';
                document.getElementById('subWhatIncursion').style.display = (val === 'INCURSION') ? 'block' : 'none';
            }
            if(tipo === 'Who') {
                const val = document.getElementById('selectWho').value;
                document.getElementById('subWhoPerp').style.display = (val === 'PERPETRATORS/ACTORS/OFFENDERS') ? 'block' : 'none';
                document.getElementById('subWhoPart').style.display = (val === 'PARTICIPANTS') ? 'block' : 'none';
                document.getElementById('subWhoOrg').style.display = (val === 'ORGANIZERS') ? 'block' : 'none';
            }
            if(tipo === 'Unficyp') {
                const val = document.getElementById('selectOrg').value;
                document.getElementById('subWhoUnficyp').style.display = (val === 'UNFICYP') ? 'block' : 'none';
            }
            if(tipo === 'Sector') {
                const val = document.getElementById('selectSector').value;
                document.getElementById('subSector1').style.display = (val === 'SECTOR 1') ? 'block' : 'none';
            }
        }

        function actualizarTitulo() {
            const formVal = document.getElementById('inputForm').value.split(':')[0] || "Report";
            const desc = document.getElementById('incidentDesc').value;
            if(!desc) return;
            const palabras = desc.trim().split(/\s+/).filter(p => p.length > 2);
            if(palabras.length > 0) {
                document.getElementById('inputTitle').value = `${formVal}: ${palabras.slice(0, 4).join(' ')}`.substring(0, 50);
            }
        }

        function validarArchivo() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length > 0 && (fileInput.files[0].size / 1024 / 1024) > 5) {
                alert("⚠️ Archivo supera los 5MB.");
                fileInput.value = "";
            }
        }

        function validarYGuardarFormulario(event) {
    event.preventDefault();
    const alertBox = document.getElementById('feedbackAlert');
    alertBox.style.color = "white";
    alertBox.style.backgroundColor = "#b45309";
    alertBox.style.display = "block";
    alertBox.innerHTML = "⏳ Enviando reporte...";

    const coordenadasRaw = document.getElementById('mgrsInput').value;
    const mainWhat = document.getElementById('selectWhat').value;
    let finalWhat = mainWhat;
    if(mainWhat === 'CIVILIAN INCIDENTS') finalWhat += ` (${document.getElementById('subWhatCivilianSelect').value})`;
    if(mainWhat === 'INCURSION') finalWhat += ` (${document.getElementById('subWhatIncursionSelect').value})`;

    const mainWho = document.getElementById('selectWho').value;
    let finalWho = mainWho;
    if(mainWho === 'PERPETRATORS/ACTORS/OFFENDERS') finalWho += ` -> ${document.getElementById('subWhoPerpSelect').value}`;
    if(mainWho === 'PARTICIPANTS') finalWho += ` -> ${document.getElementById('subWhoPartSelect').value}`;
    if(mainWho === 'ORGANIZERS') {
        const orgSub = document.getElementById('selectOrg').value;
        finalWho += ` -> ${orgSub}`;
        if(orgSub === 'UNFICYP') finalWho += ` (${document.getElementById('subWhoUnficypSelect').value})`;
    }

    const mainSector = document.getElementById('selectSector').value;
    let finalSector = mainSector;
    if(mainSector === 'SECTOR 1') finalSector += ` / ${document.getElementById('subSector1Select').value}`;

    const reporteID = `#${secuencialID++}`;

    const datosParaEnviar = {
        id: reporteID,
        eventDate: `${document.getElementById('evDate').value} - ${document.getElementById('evTime').value}`,
        categories: document.getElementById('inputForm').value,
        title: document.getElementById('inputTitle').value,
        what: finalWhat,
        where: `${finalSector} (Toay: ${coordenadasRaw} - ${document.getElementById('inputLocName').value})`,
        who: finalWho,
        author: document.getElementById('inputOfficer').value,
        sectorBase: mainSector,
        submitDate: `${document.getElementById('repDate').value} - ${document.getElementById('repTime').value}`,
        status: document.getElementById('inputStatus').value,
        latLon: coordenadasRaw,
        fileUrl: "No adjunto"
    };

    const fileInput = document.getElementById('fileInput');

    if (fileInput && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const formDataCloud = new FormData();
        formDataCloud.append('image', file);

        fetch('https://api.imgbb.com/1/upload?key=62f831b0e358c5f49dfbd92bfbc0fb5e', {
            method: 'POST',
            body: formDataCloud
        })
        .then(response => response.json())
        .then(result => {
            if (result.success && result.data && result.data.url) {
                datosParaEnviar.fileUrl = result.data.url;
            } else {
                datosParaEnviar.fileUrl = "No adjunto";
            }
            enviarFinal();
        })
        .catch((err) => {
            console.error("Error en la subida:", err);
            datosParaEnviar.fileUrl = "No adjunto";
            enviarFinal();
        });
    } else {
        datosParaEnviar.fileUrl = "No adjunto";
        enviarFinal();
    }

    function enviarFinal() {
        const formBody = new FormData();
        for (const key in datosParaEnviar) {
            formBody.append(key, datosParaEnviar[key]);
        }

        fetch(urlGoogleSheets, { method: "POST", body: formBody })
        .then(() => {
            baseDeDatosReportes.push(datosParaEnviar);
            alertBox.style.backgroundColor = "#16a34a";
            alertBox.innerHTML = `✅ ¡Reporte ${reporteID} enviado!`;
            document.getElementById('sageForm').reset();
            document.querySelectorAll('.sub-group').forEach(sg => sg.style.display = 'none');
            setTimeout(() => { 
                alertBox.style.display = "none"; 
                irABaseDatos('screenSageHub'); 
            }, 1500);
        })
        .catch((error) => {
            console.error("Error GSheets:", error);
            alertBox.style.backgroundColor = "#dc2626";
            alertBox.innerHTML = "⚠️ Error de conexión.";
        });
    }
}

function renderizarTabla() {
    const tableBody = document.getElementById('dbTableBody');
    if (!tableBody) return;
    
    tableBody.innerHTML = "";
    
    if (baseDeDatosReportes.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="12">No hay reportes cargados.</td></tr>`;
        return;
    }
    
    for (let i = baseDeDatosReportes.length - 1; i >= 0; i--) {
        const rep = baseDeDatosReportes[i];
        tableBody.innerHTML += `
            <tr>
                <td>${rep.id}</td>
                <td>${rep.eventDate}</td>
                <td>${rep.title}</td>
                <td><strong>What:</strong> ${rep.what}<br><strong>Who:</strong> ${rep.who}<br><strong>Where:</strong> ${rep.where}</td>
                <td>${rep.author}</td>
                <td>${rep.status}</td>
                <td><a href="${rep.fileUrl}" target="_blank">${rep.fileUrl === "No adjunto" ? "No adjunto" : "Ver Adjunto"}</a></td>
            </tr>
        `;
    }
}
</script>
